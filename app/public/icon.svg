<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0c24"/>
      <stop offset="100%" stop-color="#14122e"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- ambient glow -->
  <circle cx="256" cy="256" r="160" fill="#8b5cf6" opacity="0.35" filter="url(#glow)"/>

  <!-- keyboard body -->
  <rect x="80" y="160" width="352" height="208" rx="32" fill="#1a1635" stroke="url(#stroke)" stroke-width="3"/>

  <!-- keys row 1 -->
  <rect x="106" y="190" width="48" height="48" rx="10" fill="url(#key)"/>
  <rect x="166" y="190" width="48" height="48" rx="10" fill="url(#key)" opacity="0.7"/>
  <rect x="226" y="190" width="48" height="48" rx="10" fill="url(#key)" opacity="0.7"/>
  <rect x="286" y="190" width="48" height="48" rx="10" fill="url(#key)" opacity="0.7"/>
  <rect x="346" y="190" width="60" height="48" rx="10" fill="url(#key)" opacity="0.7"/>

  <!-- keys row 2 (home row, glowing) -->
  <rect x="118" y="250" width="48" height="48" rx="10" fill="url(#key)"/>
  <rect x="178" y="250" width="48" height="48" rx="10" fill="url(#key)"/>
  <rect x="238" y="250" width="48" height="48" rx="10" fill="url(#key)"/>
  <rect x="298" y="250" width="48" height="48" rx="10" fill="url(#key)"/>
  <rect x="358" y="250" width="36" height="48" rx="10" fill="url(#key)" opacity="0.7"/>

  <!-- spacebar -->
  <rect x="160" y="310" width="192" height="44" rx="10" fill="url(#key)" opacity="0.7"/>

  <!-- typing cursor -->
  <rect x="240" y="100" width="32" height="6" fill="url(#stroke)" rx="3"/>
</svg>
